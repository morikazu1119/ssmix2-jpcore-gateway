server:
  port: ${APP_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info

gateway:
  strict-validation: ${GATEWAY_STRICT_VALIDATION:false}
  fixture-root-hint: ${GATEWAY_FIXTURE_ROOT_HINT:/fixtures/ssmix2}

logging:
  level:
    org.ssmix2.jpcore.gateway: INFO

