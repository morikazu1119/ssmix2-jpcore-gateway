services:
  app:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    container_name: ${COMPOSE_PROJECT_NAME:-ssmix2-jpcore-gateway}-app
    environment:
      APP_PORT: 8080
      GATEWAY_STRICT_VALIDATION: ${GATEWAY_STRICT_VALIDATION:-false}
      GATEWAY_FIXTURE_ROOT_HINT: /fixtures/ssmix2
    ports:
      - "${APP_HOST_PORT:-8080}:8080"
    volumes:
      - ../profiles-jp/src/main/resources/fixtures:/fixtures:ro
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    container_name: ${COMPOSE_PROJECT_NAME:-ssmix2-jpcore-gateway}-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-gateway}
      POSTGRES_USER: ${POSTGRES_USER:-gateway}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-gateway}
    ports:
      - "${POSTGRES_HOST_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-gateway} -d ${POSTGRES_DB:-gateway}"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:

